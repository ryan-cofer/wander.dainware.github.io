<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Wander</title>
    <style>
        /* Base styles (desktop first) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
            max-width: 100%;
        }

        body {
            background-color: #2e2e2e;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: bold;
            letter-spacing: -0.05em;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
            max-width: 100vw;
        }

        /* Top-left logo */
        .top-left {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 75px;
            height: auto;
        }

        /* Top-right hamburger */
        .hamburger {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .hamburger img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Dropdown menu */
        .menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 10px;
            background-color: #1c1c1c;
            border: 1px solid #444;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            text-align: left;
            min-width: 200px;
        }

        .menu.active {
            display: block;
        }

        .menu a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #ffffff;
            border-bottom: 1px solid #333;
            font-weight: normal;
            transition: background-color 0.2s;
        }

        .menu a:last-child {
            border-bottom: none;
        }

        .menu a:hover {
            background-color: #333;
        }

        /* Main content container */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-top: 100px;
            overflow-x: hidden;
        }

        /* Icon grid */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .icon-grid img {
            width: 150px;
            height: auto;
            display: block;
            border-radius: 20px;
        }

        /* Typography */
        .title {
            font-size: 60px;
            margin: 20px 0 5px;
        }

        .subtitle {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .description {
            font-size: 18px;
            font-weight: normal;
            letter-spacing: 0.05em;
            text-align: justify;
            max-width: 800px;
            margin: 0 auto 50px;
            line-height: 1.6;
        }

        .download-button {
            width: 150px;
            height: auto;
            cursor: pointer;
            margin: 50px 0;
        }

        .footer {
            font-size: 20px;
            margin-top: auto;
            padding: 20px 0;
        }

        /* Mobile styles */
        @media (max-width: 800px) {
            .top-left {
                width: 50px;
            }

            .content-wrapper {
                margin-top: 80px;
            }

            .icon-grid {
                grid-template-columns: repeat(4, 80px);
                gap: 10px;
            }

            .icon-grid img {
                width: 80px;
                border-radius: 15px;
            }

            .title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 18px;
            }

            .description {
                font-size: 16px;
                padding: 0 20px;
            }

            .download-button {
                margin: 30px 0;
            }

            .footer {
                font-size: 16px;
            }

            .app-icon {
                max-width: 120px !important;
                margin-bottom: 40px !important;
            }

            .app-title {
                max-width: 220px !important;
            }
        }

        @media (max-width: 400px) {
            .icon-grid {
                grid-template-columns: repeat(4, 70px);
                gap: 8px;
            }

            .icon-grid img {
                width: 70px;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Top-left logo -->
    <img class="top-left" 
         src="https://github.com/ryan-cofer/dainware.github.io/blob/main/translate/dainwareLogo.png?raw=true" 
         alt="Dainware Logo">

    <!-- Top-right hamburger menu -->
    <button class="hamburger" 
            onclick="toggleMenu()" 
            aria-label="Toggle menu"
            aria-expanded="false">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/menu--v1.png" 
             alt="Menu icon">
    </button>

    <!-- Dropdown menu -->
    <nav class="menu" id="menu" role="navigation">
        <a href="index.html">home</a>
        <a href="privacy.html">privacy policy</a>
        <a href="terms.html">terms of service</a>
        <a href="/cdn-cgi/l/email-protection#21525451514e5355614540484f564053440f424e4c">contact</a>
    </nav>

    <!-- Main content -->
    <main class="content-wrapper">

        <img src="https://github.com/ryan-cofer/dainware.github.io/blob/main/wander/appIcon.png?raw=true"
            alt="Wander app icon"
            class="app-icon"
            style="max-width: 200px; width: 100%; border-radius: 22%; margin-bottom: 100px;">

        <img src="https://github.com/ryan-cofer/dainware.github.io/blob/main/wander/appTitle.png?raw=true"
            alt="Wander app title"
            class="app-title"
            style="max-width: 400px; width: 100%;">
        
        <p class="subtitle">worldwide audio guide</p>

        <a href="https://apps.apple.com/us/app/wander-worldwide-audio-guide/id6759094813" 
           aria-label="Download from App Store"
           target="_blank" 
           rel="noopener noreferrer">
            <img src="https://github.com/ryan-cofer/dainware.github.io/blob/main/noval/downloadButton.svg?raw=true"
                 alt="Download on the App Store"
                 class="download-button">
        </a>

        <p class="footer">support@dainware.com</p>
    </main>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const hamburger = document.querySelector('.hamburger');
            const isExpanded = menu.classList.toggle('active');
            hamburger.setAttribute('aria-expanded', isExpanded);
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('menu');
            const hamburger = document.querySelector('.hamburger');
            
            if (!menu.contains(event.target) && !hamburger.contains(event.target)) {
                menu.classList.remove('active');
                hamburger.setAttribute('aria-expanded', 'false');
            }
        });
    </script>
</body>
</html>
